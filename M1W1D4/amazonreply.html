<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Reply</title>
</head>

<body>
    <header class="top-header">
        <img class="logo" src="./assets/logo.png" alt="logo">
    </header>

    <div class="menu-container">
        <ul>
            <li><a href="#">All</a></li>
            <li><a href="#">Today's deafs</a></li>
            <li><a href="#">Customer Service</a></li>
            <li><a href="#">Registry</a></li>
            <li><a href="#">Gift Card</a></li>
            <li><a href="#">Sell</a></li>
        </ul>
    </div>


    <div class="separator">
        <p>Shop All Holiday Gift Cards</p>
    </div>

    <div class="gift-container">
        <h1>Holiday Gift Guides</h1>
        <p>Be a go-gifter</p>
    </div>

    <div class="container-carousel">
        <p class="subtitle">Find the perfect gift<a class="shop-link" href="#">Shop now</a></p>
        <div class="image-gallery">
            <img src="./assets/img_1.jpg" alt="img1">
            <img src="./assets/img_2.jpg" alt="img2">
            <img src="./assets/img_3.jpg" alt="img3">
            <img src="./assets/img_4.jpg" alt="img4">
        </div>
    </div>

    <div class="container-section-image-first">
        <img class="image-section" src="./assets/img_9.png" alt="img5">
        <p class="subtitle-game">Play the gifting game<a class="shop-gaming" href="#">Shop gaming</a></p>
    </div>


    <div class="container-section-image-two">
            <img class="image-section-two" src="./assets/img_10.png" alt="img6">
            <p class="subtitle-accessories">The sound of chear<a class="shop-accessories" href="#">Shop Audio & Accessories</a></p>
        </div>

        <footer>
            <div class="main-footer">
                <h3 class="text-bottom">Back to top</h3>
            </div>
            <div class="footer-logo">
                <img class="reply-logo" src="./assets/logo.png" alt="logo">
            </div>

        </footer>
</body>

</html>
